{% extends "base.html" %}

{% block content %}

<div class="report-card">
    <div class="report-logo">
        <img src="{{ url_for('static', filename='icons/logo.png') }}">
    </div>

    <div class="report-title">
        Registro de Reporte
    </div>

    <form class="report-form">
        <div class="input-group">
            <label>Lugar</label>
            <input type="text">
        </div>

        <div class="input-group">
            <label>Fecha</label>
            <input type="date">
        </div>

        <div class="input-group">
            <label>Hora</label>
            <input type="time">
        </div>

        <div class="input-group">
            <label>Nombre de zona</label>
            <input type="text">
        </div>

        <div class="input-group">
            <label>Tipo de zona</label>
            <input type="text">
        </div>

        <div class="input-group">
            <label>Población afectada</label>
            <input type="number">
        </div>

        <div class="input-group">
            <label>Descripción del incidente</label>
            <input type="text">
        </div>

        <div class="input-group">
            <label>Tipo de evidencia</label>
            <input type="text">
        </div>

        <label class="upload-btn">
            Cargar archivo
            <input type="file" hidden>
        </label>

        <button class="btn-primary" style="margin-top:15px;">
            Enviar reporte
        </button>
    </form>
</div>

{% endblock %}
