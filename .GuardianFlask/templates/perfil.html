{% extends "base.html" %}

{% block content %}

<div class="profile-card">

    <div class="profile-header">

        <div class="profile-avatar">
            <img src="{{ url_for('static', filename='img/default-user.png') }}" alt="Usuario">
        </div>

        <div class="profile-name">
            Nombre de Voluntario
        </div>

        <div class="profile-status">
            Voluntario (Aprobado)
        </div>

        <div class="profile-email">
            correovoluntario@gmail.com
        </div>

        <button class="btn-edit">
            Editar información
        </button>

    </div>

    <div class="profile-info">
        <h4>Información del perfil</h4>

        <div class="info-row">
            <strong>Nombre:</strong>
            <span>Nombre completo de voluntario</span>
        </div>

        <div class="info-row">
            <strong>Email:</strong>
            <span>correovoluntario@gmail.com</span>
        </div>

        <div class="info-row">
            <strong>Teléfono:</strong>
            <span>1234567890</span>
        </div>

        <div class="info-row">
            <strong>Dirección:</strong>
            <span>El Rosario, El Marqués, Qro.</span>
        </div>
    </div>
</div>


<div class="profile-footer">
    <button class="btn-primary">
        Editar detalles de Voluntario
    </button>
</div>

{% endblock %}
